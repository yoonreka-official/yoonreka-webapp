name: Deploy S3 Production

on:
  release:
    types:
      - published

jobs:
  deploy-s3-prod:
    runs-on: ubuntu-latest
    env:
      AWS_DEFAULT_REGION: ap-northeast-2
      S3_BUCKET: web.yoonreka.app
      CLOUDFRONT_ALIAS: student.yoonreka.app
      CLOUDFRONT_DISTRIBUTION_ID: EXH0TEBRWGM63
      CLOUDFRONT_FUNCTION_NAME: yoonreka-webapp-spa-rewrite

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Sync immutable assets
        run: |
          aws s3 sync dist "s3://${S3_BUCKET}" \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload SPA shell
        run: |
          aws s3 cp dist/index.html "s3://${S3_BUCKET}/index.html" \
            --content-type "text/html; charset=utf-8" \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Ensure CloudFront SPA fallback
        run: |
          cat > /tmp/spa-rewrite.js <<'EOF'
          function handler(event) {
            var request = event.request;
            var uri = request.uri;
            var lastSegment = uri.substring(uri.lastIndexOf('/') + 1);

            if (uri === '/' || uri.endsWith('/') || lastSegment.indexOf('.') === -1) {
              request.uri = '/index.html';
            }

            return request;
          }
          EOF

          if aws cloudfront describe-function --name "${CLOUDFRONT_FUNCTION_NAME}" --stage DEVELOPMENT > /tmp/function.json 2>/dev/null; then
            FUNCTION_ETAG="$(jq -r .ETag /tmp/function.json)"
            aws cloudfront update-function \
              --name "${CLOUDFRONT_FUNCTION_NAME}" \
              --if-match "${FUNCTION_ETAG}" \
              --function-config Comment="Yoonreka webapp SPA route rewrite",Runtime=cloudfront-js-2.0 \
              --function-code fileb:///tmp/spa-rewrite.js > /tmp/function-update.json
          else
            aws cloudfront create-function \
              --name "${CLOUDFRONT_FUNCTION_NAME}" \
              --function-config Comment="Yoonreka webapp SPA route rewrite",Runtime=cloudfront-js-2.0 \
              --function-code fileb:///tmp/spa-rewrite.js > /tmp/function-update.json
          fi

          FUNCTION_ETAG="$(jq -r .ETag /tmp/function-update.json)"
          aws cloudfront publish-function \
            --name "${CLOUDFRONT_FUNCTION_NAME}" \
            --if-match "${FUNCTION_ETAG}" > /tmp/function-publish.json
          FUNCTION_ARN="$(jq -r .FunctionSummary.FunctionMetadata.FunctionARN /tmp/function-publish.json)"

          TARGET_DISTRIBUTION_ID="$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Aliases.Items && contains(Aliases.Items, '${CLOUDFRONT_ALIAS}')].Id | [0]" \
            --output text)"
          if [ -z "${TARGET_DISTRIBUTION_ID}" ] || [ "${TARGET_DISTRIBUTION_ID}" = "None" ]; then
            TARGET_DISTRIBUTION_ID="${CLOUDFRONT_DISTRIBUTION_ID}"
          fi
          echo "TARGET_CLOUDFRONT_DISTRIBUTION_ID=${TARGET_DISTRIBUTION_ID}" >> "${GITHUB_ENV}"
          echo "Using CloudFront distribution ${TARGET_DISTRIBUTION_ID} for ${CLOUDFRONT_ALIAS}"

          aws cloudfront get-distribution-config --id "${TARGET_DISTRIBUTION_ID}" > /tmp/distribution.json
          ETAG="$(jq -r .ETag /tmp/distribution.json)"
          jq --arg functionArn "${FUNCTION_ARN}" '
            def spaFallback($code): {
              "ErrorCode": $code,
              "ResponsePagePath": "/index.html",
              "ResponseCode": "200",
              "ErrorCachingMinTTL": 0
            };
            .DistributionConfig
            | (.CustomErrorResponses //= {"Quantity": 0, "Items": []})
            | (.CustomErrorResponses.Items //= [])
            | .CustomErrorResponses.Items = (
                [.CustomErrorResponses.Items[]? | select(.ErrorCode != 403 and .ErrorCode != 404)]
                + [spaFallback(403), spaFallback(404)]
              )
            | .CustomErrorResponses.Quantity = (.CustomErrorResponses.Items | length)
            | (.DefaultCacheBehavior.FunctionAssociations //= {"Quantity": 0, "Items": []})
            | (.DefaultCacheBehavior.FunctionAssociations.Items //= [])
            | .DefaultCacheBehavior.FunctionAssociations.Items = (
                [.DefaultCacheBehavior.FunctionAssociations.Items[]? | select(.EventType != "viewer-request")]
                + [{"EventType": "viewer-request", "FunctionARN": $functionArn}]
              )
            | .DefaultCacheBehavior.FunctionAssociations.Quantity = (
                .DefaultCacheBehavior.FunctionAssociations.Items | length
              )
          ' /tmp/distribution.json > /tmp/distribution-config.json
          aws cloudfront update-distribution \
            --id "${TARGET_DISTRIBUTION_ID}" \
            --if-match "${ETAG}" \
            --distribution-config file:///tmp/distribution-config.json

      - name: Wait for CloudFront deployment
        run: aws cloudfront wait distribution-deployed --id "${TARGET_CLOUDFRONT_DISTRIBUTION_ID}"

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id "${TARGET_CLOUDFRONT_DISTRIBUTION_ID}" --paths "/*"

      - name: Verify student SPA direct routes
        run: |
          for path in /auth/login /grades/exams /wrong-answers; do
            status=""
            for attempt in {1..20}; do
              status="$(curl -L -s -o /dev/null -w "%{http_code}" "https://${CLOUDFRONT_ALIAS}${path}")"
              if [ "${status}" = "200" ]; then
                echo "${path} -> 200"
                break
              fi
              echo "${path} -> ${status}; retry ${attempt}/20"
              sleep 15
            done

            if [ "${status}" != "200" ]; then
              echo "${path} failed with ${status}"
              exit 1
            fi
          done
