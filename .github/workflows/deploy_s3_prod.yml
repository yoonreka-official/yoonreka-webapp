name: Deploy S3 Production

on:
  release:
    types:
      - published

jobs:
  deploy-s3-prod:
    runs-on: ubuntu-latest
    env:
      AWS_DEFAULT_REGION: ap-northeast-2
      S3_BUCKET: web.yoonreka.app
      CLOUDFRONT_DISTRIBUTION_ID: EXH0TEBRWGM63

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Sync immutable assets
        run: |
          aws s3 sync dist "s3://${S3_BUCKET}" \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload SPA shell
        run: |
          aws s3 cp dist/index.html "s3://${S3_BUCKET}/index.html" \
            --content-type "text/html; charset=utf-8" \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Ensure CloudFront SPA fallback
        run: |
          aws cloudfront get-distribution-config --id "${CLOUDFRONT_DISTRIBUTION_ID}" > /tmp/distribution.json
          ETAG="$(jq -r .ETag /tmp/distribution.json)"
          jq '
            def spaFallback($code): {
              "ErrorCode": $code,
              "ResponsePagePath": "/index.html",
              "ResponseCode": "200",
              "ErrorCachingMinTTL": 0
            };
            .DistributionConfig
            | (.CustomErrorResponses //= {"Quantity": 0, "Items": []})
            | (.CustomErrorResponses.Items //= [])
            | .CustomErrorResponses.Items = (
                [.CustomErrorResponses.Items[]? | select(.ErrorCode != 403 and .ErrorCode != 404)]
                + [spaFallback(403), spaFallback(404)]
              )
            | .CustomErrorResponses.Quantity = (.CustomErrorResponses.Items | length)
          ' /tmp/distribution.json > /tmp/distribution-config.json
          aws cloudfront update-distribution \
            --id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --if-match "${ETAG}" \
            --distribution-config file:///tmp/distribution-config.json

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" --paths "/*"
