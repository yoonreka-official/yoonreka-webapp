query GetMyNotifications(
  $first: Int
  $order: NotificationRelayOrder
  $skip: Int
  $filter: NotificationFilterInput
  $asc: Boolean
) {
  myNotificationPagination(
    first: $first
    order: $order
    skip: $skip
    filter: $filter
    asc: $asc
  ) {
    totalCount
    edges {
      cursor
      node {
        id

        link {
          __typename # LectureInvoice 또는 Material 또는 Notice 입니다.
          ... on LectureInvoice {
            id
          }
          ... on Material {
            id
          }
          ... on Notice {
            id
          }
        }
        lectureInvoice {
          price
          state
          type
          paidAt
          method
          lecture {
            id
            title
          }
          dueDate
          books {
            id
            title
            price
          }
        }
        material {
          attachments {
            createdAt
            filename
            id
            mimeType
            size
            updatedAt
            url
          }
          description
          id
          lectures {
            id
            title
          }
          title
          createdAt
          updatedAt
        }
        createdAt
        notice {
          createdAt
          description
          id
          isAll
          link
          title
          updatedAt
          lectures {
            id
            title
          }
          attachments {
            createdAt
            filename
            id
            mimeType
            size
            updatedAt
            url
          }
        }
        contents
        title
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
    }
  }
}
